<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Housing Market Analysis | Story</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header class="site-header">
        <nav class="navbar" aria-label="Main navigation">
            <a class="brand" href="index.html">Housing Market Analysis</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="dashboard.html">dashboard.html</a></li>
                <li><a class="active" href="story.html">story.html</a></li>
                <li><a href="about.html">about.html</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="section reveal" aria-labelledby="story-heading">
            <h1 id="story-heading" class="page-title">House Trends Story</h1>
            <div class="viz-shell">
                <div class="tableauPlaceholder" id="viz_story" style="position: relative">
                    <noscript>
                        <a href="#">
                            <img
                                alt="House Story"
                                src="https://public.tableau.com/static/images/Pr/ProjectFinalWorkbook/Story2/1_rss.png"
                                style="border: none"
                            />
                        </a>
                    </noscript>
                    <object class="tableauViz" style="display:none;">
                        <param name="host_url" value="https%3A%2F%2Fpublic.tableau.com%2F" />
                        <param name="embed_code_version" value="3" />
                        <param name="site_root" value="" />
                        <param name="name" value="ProjectFinalWorkbook/Story2" />
                        <param name="tabs" value="no" />
                        <param name="toolbar" value="yes" />
                        <param name="static_image" value="https://public.tableau.com/static/images/Pr/ProjectFinalWorkbook/Story2/1.png" />
                        <param name="animate_transition" value="yes" />
                        <param name="display_static_image" value="yes" />
                        <param name="display_spinner" value="yes" />
                        <param name="display_overlay" value="yes" />
                        <param name="display_count" value="yes" />
                        <param name="language" value="en-US" />
                        <param name="filter" value="publish=yes" />
                    </object>
                </div>
            </div>
        </section>
    </main>

    <script>
        const storyContainer = document.getElementById("viz_story");
        const storyViz = storyContainer.getElementsByTagName("object")[0];

        function adjustStorySize() {
            const width = storyContainer.offsetWidth;
            storyViz.style.width = "100%";

            if (width > 900) {
                storyViz.style.height = `${width * 0.82}px`;
            } else if (width > 560) {
                storyViz.style.height = `${width * 1.12}px`;
            } else {
                storyViz.style.height = "1600px";
            }
        }

        const storyScript = document.createElement("script");
        storyScript.src = "https://public.tableau.com/javascripts/api/viz_v1.js";
        storyViz.parentNode.insertBefore(storyScript, storyViz);

        adjustStorySize();
        window.addEventListener("resize", adjustStorySize);
    </script>
</body>
</html>
