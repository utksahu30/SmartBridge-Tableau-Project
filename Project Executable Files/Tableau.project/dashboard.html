<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Housing Market Analysis | Dashboard</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header class="site-header">
        <nav class="navbar" aria-label="Main navigation">
            <a class="brand" href="index.html">Housing Market Analysis</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a class="active" href="dashboard.html">dashboard.html</a></li>
                <li><a href="story.html">story.html</a></li>
                <li><a href="about.html">about.html</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="section reveal" aria-labelledby="dashboard-heading">
            <h1 id="dashboard-heading" class="page-title">Comprehensive Home Price Analysis</h1>
            <div class="viz-shell">
                <div class="tableauPlaceholder" id="viz_dashboard" style="position: relative">
                    <noscript>
                        <a href="#">
                            <img
                                alt="Comprehensive Home Price Analysis"
                                src="https://public.tableau.com/static/images/Pr/ProjectFinalWorkbook/Dashboard1/1_rss.png"
                                style="border: none"
                            />
                        </a>
                    </noscript>
                    <object class="tableauViz" style="display:none;">
                        <param name="host_url" value="https%3A%2F%2Fpublic.tableau.com%2F" />
                        <param name="embed_code_version" value="3" />
                        <param name="site_root" value="" />
                        <param name="name" value="ProjectFinalWorkbook/Dashboard1" />
                        <param name="tabs" value="no" />
                        <param name="toolbar" value="yes" />
                        <param name="static_image" value="https://public.tableau.com/static/images/Pr/ProjectFinalWorkbook/Dashboard1/1.png" />
                        <param name="animate_transition" value="yes" />
                        <param name="display_static_image" value="yes" />
                        <param name="display_spinner" value="yes" />
                        <param name="display_overlay" value="yes" />
                        <param name="display_count" value="yes" />
                        <param name="language" value="en-US" />
                        <param name="filter" value="publish=yes" />
                    </object>
                </div>
            </div>
        </section>
    </main>

    <script>
        const dashboardContainer = document.getElementById("viz_dashboard");
        const dashboardViz = dashboardContainer.getElementsByTagName("object")[0];

        function adjustDashboardSize() {
            const width = dashboardContainer.offsetWidth;
            dashboardViz.style.width = "100%";

            if (width > 900) {
                dashboardViz.style.height = `${width * 0.82}px`;
            } else if (width > 560) {
                dashboardViz.style.height = `${width * 1.12}px`;
            } else {
                dashboardViz.style.height = "1800px";
            }
        }

        const dashboardScript = document.createElement("script");
        dashboardScript.src = "https://public.tableau.com/javascripts/api/viz_v1.js";
        dashboardViz.parentNode.insertBefore(dashboardScript, dashboardViz);

        adjustDashboardSize();
        window.addEventListener("resize", adjustDashboardSize);
    </script>
</body>
</html>
